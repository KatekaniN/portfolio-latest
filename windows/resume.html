<div
        class="window"
        id="resume"
        style="top: 110px; left: 550px; width: 580px; height: 650px"
      >
        <div class="window-header">
          <div class="window-title"><i class="fas fa-file-alt"></i> Resume</div>
          <div class="window-controls">
            <button
              class="window-control minimize"
              onclick="windowManager.minimizeWindow('resume')"
              title="Minimize"
            ></button>
            <button
              class="window-control maximize"
              onclick="windowManager.maximizeWindow('resume')"
              title="Maximize"
            ></button>
            <button
              class="window-control close"
              onclick="windowManager.closeWindow('resume')"
              title="Close"
            ></button>
          </div>
        </div>
        <div class="window-content">
          <div class="resume-download-container">
            <h2>My Resume</h2>
            <p>
              Download my complete professional resume with detailed work
              experience, education, and technical skills.
            </p>

            <a href="#" class="download-resume">
              <i class="fas fa-download"></i>
              Download PDF Resume
            </a>

            <div class="resume-file-info">
              <div class="file-detail">
                <span>File Type:</span>
                <span>PDF Document</span>
              </div>
              <div class="file-detail">
                <span>File Size:</span>
                <span>~250 KB</span>
              </div>
              <div class="file-detail">
                <span>Last Updated:</span>
                <span>August 2025</span>
              </div>
            </div>
          </div>
        </div>
      </div>
